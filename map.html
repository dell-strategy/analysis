<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dell SLG Strategies | Interactive Analysis Map</title>
    
    <!-- Tailwind CSS for rapid, professional styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        /* Ensure the map takes up the full available height */
        #map { height: 100%; width: 100%; z-index: 10; }
        
        /* Custom pure-CSS Map Markers to avoid needing external image assets */
        .custom-marker {
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }
        .custom-marker:hover {
            transform: scale(1.2);
            z-index: 1000 !important;
        }
        
        /* Marker Categories */
        .marker-state { background-color: #0076CE; } /* Dell Blue */
        .marker-city { background-color: #10B981; }  /* Emerald Green */
        .marker-county { background-color: #F59E0B; } /* Amber Orange */
        .marker-university { background-color: #8B5CF6; } /* Violet Purple */

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .leaflet-popup-content { margin: 16px; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-[#0076CE] text-white px-6 py-4 shadow-md flex justify-between items-center z-20 relative">
        <div class="flex items-center space-x-3">
            <!-- Simple SVG Logo Placeholder -->
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h1 class="text-2xl font-bold tracking-tight">SLG Strategies Hub</h1>
        </div>
        <div class="flex items-center space-x-4">
            <span class="hidden md:inline text-sm font-medium opacity-80">
                Interactive Infographic Explorer
            </span>
            <a href="https://dell-strategy.github.io/analysis/50-state-overview.html" target="_blank" 
               class="bg-white text-[#0076CE] hover:bg-gray-100 font-bold py-2 px-4 rounded shadow-sm text-sm transition flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                50 State Overview
            </a>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- Sidebar Navigation & Search -->
        <aside class="w-full md:w-80 bg-white shadow-xl flex flex-col z-20 h-1/3 md:h-full">
            <div class="p-4 border-b border-gray-100 bg-gray-50">
                <h2 class="text-gray-700 font-semibold mb-3">Find a Location</h2>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search states, cities..." 
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0076CE] focus:border-transparent transition-all">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- Dynamic List of Locations -->
            <div class="flex-1 overflow-y-auto p-2" id="locationList">
                <!-- Javascript will inject list items here -->
            </div>
            
            <!-- Filter Toggles -->
            <div class="p-4 border-t border-gray-100 bg-gray-50 text-sm text-gray-700 space-y-3">
                <h3 class="font-semibold text-xs uppercase tracking-wider text-gray-500 mb-2">Filter by Type</h3>
                <label class="flex items-center cursor-pointer hover:bg-gray-100 p-1 -ml-1 rounded transition">
                    <input type="checkbox" value="State" checked onchange="toggleFilter(this)" class="w-4 h-4 cursor-pointer accent-[#0076CE]">
                    <span class="ml-2 flex items-center"><div class="w-3 h-3 rounded-full bg-[#0076CE] mr-2"></div> State Level</span>
                </label>
                <label class="flex items-center cursor-pointer hover:bg-gray-100 p-1 -ml-1 rounded transition">
                    <input type="checkbox" value="City" checked onchange="toggleFilter(this)" class="w-4 h-4 cursor-pointer accent-[#10B981]">
                    <span class="ml-2 flex items-center"><div class="w-3 h-3 rounded-full bg-[#10B981] mr-2"></div> City Level</span>
                </label>
                <label class="flex items-center cursor-pointer hover:bg-gray-100 p-1 -ml-1 rounded transition">
                    <input type="checkbox" value="County" checked onchange="toggleFilter(this)" class="w-4 h-4 cursor-pointer accent-[#F59E0B]">
                    <span class="ml-2 flex items-center"><div class="w-3 h-3 rounded-full bg-[#F59E0B] mr-2"></div> County Level</span>
                </label>
                <label class="flex items-center cursor-pointer hover:bg-gray-100 p-1 -ml-1 rounded transition">
                    <input type="checkbox" value="University" checked onchange="toggleFilter(this)" class="w-4 h-4 cursor-pointer accent-[#8B5CF6]">
                    <span class="ml-2 flex items-center"><div class="w-3 h-3 rounded-full bg-[#8B5CF6] mr-2"></div> University Level</span>
                </label>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="flex-1 relative h-2/3 md:h-full bg-gray-200">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        // Base URL configuration
        const baseUrl = "https://dell-strategy.github.io/analysis";
        
        let locations = [];
        let map;
        let markerClusterGroup;
        const markerRefs = {};

        // State for map filters
        const activeFilters = {
            State: true,
            City: true,
            County: true,
            University: true
        };

        // Initialize the Application
        async function initApp() {
            try {
                // Try to load from external map-data.json
                const response = await fetch('map-data.json');
                if (!response.ok) throw new Error("Failed to load");
                locations = await response.json();
            } catch (error) {
                console.warn("Could not load map-data.json (expected if running locally without a web server). Using fallback data.");
                // Fallback data so the app always works during local testing / Canvas previews
                locations = [
                    { name: "Arkansas", type: "State", lat: 34.7465, lng: -92.2896, slug: "arkansas" },
                    { name: "California", type: "State", lat: 36.7783, lng: -119.4179, slug: "california" },
                    { name: "Florida", type: "State", lat: 27.9944, lng: -81.7603, slug: "florida" },
                    { name: "Illinois", type: "State", lat: 40.0000, lng: -89.0000, slug: "illinois" },
                    { name: "Indiana", type: "State", lat: 39.7684, lng: -86.1581, slug: "indiana" },
                    { name: "Louisiana", type: "State", lat: 31.1695, lng: -91.8678, slug: "louisiana" },
                    { name: "Minnesota", type: "State", lat: 46.7296, lng: -94.6859, slug: "minnesota" },
                    { name: "New Jersey", type: "State", lat: 40.0583, lng: -74.4057, slug: "new-jersey" },
                    { name: "New York", type: "State", lat: 43.2994, lng: -74.2179, slug: "new-york" },
                    { name: "North Carolina", type: "State", lat: 35.7596, lng: -79.0193, slug: "north-carolina" },
                    { name: "Oklahoma", type: "State", lat: 35.0078, lng: -97.0929, slug: "oklahoma" },
                    { name: "Texas", type: "State", lat: 31.9686, lng: -99.9018, slug: "texas" },
                    { name: "Washington", type: "State", lat: 47.7511, lng: -120.7401, slug: "washington" },
                    { name: "Chicago, IL", type: "City", lat: 41.8781, lng: -87.6298, slug: "chicago", stateSlug: "illinois" },
                    { name: "Houston, TX", type: "City", lat: 29.7604, lng: -95.3698, slug: "houston", stateSlug: "texas" },
                    { name: "Baton Rouge, LA", type: "City", lat: 30.4515, lng: -91.1871, slug: "baton-rouge", stateSlug: "louisiana" },
                    { name: "New York City, NY", type: "City", lat: 40.7128, lng: -74.0060, slug: "new-york-city", stateSlug: "new-york" },
                    { name: "Harris County, TX", type: "County", lat: 29.9500, lng: -95.5500, slug: "harris-county", stateSlug: "texas" },
                    { name: "UT Austin", type: "University", lat: 30.2849, lng: -97.7341, slug: "ut-austin", stateSlug: "texas" }
                ];
            }

            // Sort locations alphabetically by name
            locations.sort((a, b) => a.name.localeCompare(b.name));

            initMap();
            renderMapMarkers();
            renderList();
        }

        function initMap() {
            const usBounds = [
                [20.0, -130.0],
                [55.0, -60.0]
            ];

            map = L.map('map', {
                maxBounds: usBounds,
                maxBoundsViscosity: 1.0,
                minZoom: 5
            }).setView([39.8283, -98.5795], 4);

            // Load Esri Light Gray Canvas (Removes rivers and geographical clutter)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ',
                maxZoom: 16
            }).addTo(map);
            
            // Add the Esri Reference layer (Adds the state/city labels back on top)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}', {
                attribution: '',
                maxZoom: 16
            }).addTo(map);

            // Add Custom "Reset View" Control
            const resetControl = L.control({position: 'topright'});
            resetControl.onAdd = function () {
                const btn = L.DomUtil.create('button', 'bg-white text-gray-700 hover:bg-gray-100 font-semibold py-2 px-3 border border-gray-300 rounded shadow-sm text-sm m-2 transition cursor-pointer');
                btn.innerHTML = '🏠 Reset Map View';
                btn.onclick = function(e) {
                    e.preventDefault();
                    map.flyTo([39.8283, -98.5795], 4, { duration: 1.5 });
                };
                return btn;
            };
            resetControl.addTo(map);

            // Initialize Marker Cluster Group
            markerClusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                maxClusterRadius: 40
            });
            map.addLayer(markerClusterGroup);
        }

        function getMarkerClass(type) {
            if (type === 'State') return 'marker-state';
            if (type === 'City') return 'marker-city';
            if (type === 'County') return 'marker-county';
            if (type === 'University') return 'marker-university';
            return 'marker-state';
        }

        function renderMapMarkers() {
            markerClusterGroup.clearLayers();
            
            locations.forEach(loc => {
                if (!activeFilters[loc.type]) return; // Skip if filtered out

                const targetUrl = loc.stateSlug 
                    ? `${baseUrl}/${loc.stateSlug}/${loc.slug}/analysis.html` 
                    : `${baseUrl}/${loc.slug}/analysis.html`;

                const customIcon = L.divIcon({
                    className: `custom-marker ${getMarkerClass(loc.type)}`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8],
                    popupAnchor: [0, -10]
                });

                const marker = L.marker([loc.lat, loc.lng], { icon: customIcon });

                // Add simple hover tooltip
                marker.bindTooltip(`<b>${loc.name}</b><br><span class="text-xs text-gray-500">${loc.type}</span>`, { 
                    direction: 'top', 
                    offset: [0, -10],
                    opacity: 0.95
                });

                const popupHtml = `
                    <div class="text-center min-w-[150px]">
                        <h3 class="font-bold text-gray-800 text-base mb-1">${loc.name}</h3>
                        <span class="inline-block px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-full mb-3">${loc.type} Analysis</span>
                        <a href="${targetUrl}" target="_blank" 
                           class="block w-full bg-[#0076CE] hover:bg-blue-700 !text-white text-sm font-semibold py-2 px-4 rounded transition shadow-sm">
                           View Infographic
                        </a>
                    </div>
                `;
                
                marker.bindPopup(popupHtml);
                markerRefs[loc.name] = marker; 
                markerClusterGroup.addLayer(marker);
            });
        }

        // ==========================================
        // SIDEBAR LIST & SEARCH LOGIC
        // ==========================================
        const locationListEl = document.getElementById('locationList');
        const searchInput = document.getElementById('searchInput');

        window.toggleFilter = function(checkbox) {
            const type = checkbox.value;
            activeFilters[type] = checkbox.checked;
            
            // Re-render map markers based on updated filters
            renderMapMarkers();
            
            // Re-render the Sidebar List
            renderList(searchInput.value);
        };

        function renderList(filterText = "") {
            locationListEl.innerHTML = "";
            const lowerFilter = filterText.toLowerCase();

            const filteredLocations = locations.filter(loc => 
                activeFilters[loc.type] && // Check if this type is toggled ON
                (loc.name.toLowerCase().includes(lowerFilter) || 
                 loc.type.toLowerCase().includes(lowerFilter))
            );

            if(filteredLocations.length === 0) {
                locationListEl.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">No locations found.</p>`;
                return;
            }

            filteredLocations.forEach(loc => {
                let dotColor = loc.type === 'State' ? 'bg-[#0076CE]' : 
                               loc.type === 'City' ? 'bg-[#10B981]' : 
                               loc.type === 'County' ? 'bg-[#F59E0B]' : 'bg-[#8B5CF6]';

                const targetUrl = loc.stateSlug 
                    ? `${baseUrl}/${loc.stateSlug}/${loc.slug}/analysis.html` 
                    : `${baseUrl}/${loc.slug}/analysis.html`;

                const itemHtml = `
                    <div class="p-3 mb-2 rounded-lg border border-gray-100 hover:border-blue-300 hover:bg-blue-50 cursor-pointer transition flex items-center justify-between group"
                         onclick="focusMapOn('${loc.name}')">
                        <div class="flex items-center space-x-3">
                            <div class="w-3 h-3 rounded-full ${dotColor} shadow-sm"></div>
                            <div>
                                <p class="font-semibold text-gray-800 text-sm">${loc.name}</p>
                                <p class="text-xs text-gray-500">${loc.type}</p>
                            </div>
                        </div>
                        <a href="${targetUrl}" target="_blank" onclick="event.stopPropagation();" 
                           class="opacity-0 group-hover:opacity-100 p-2 text-[#0076CE] hover:bg-blue-100 rounded transition" title="Open Infographic">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                            </svg>
                        </a>
                    </div>
                `;
                locationListEl.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        window.focusMapOn = function(name) {
            const loc = locations.find(l => l.name === name);
            const marker = markerRefs[name];
            if (loc && marker) {
                // Safely zoom into a marker even if it's currently hidden inside a cluster
                markerClusterGroup.zoomToShowLayer(marker, function () {
                    marker.openPopup();
                });
                
                if(window.innerWidth < 768) {
                    document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
                }
            }
        };

        // Start the application
        initApp();
        searchInput.addEventListener('input', (e) => renderList(e.target.value));

    </script>
</body>
</html>
